id: semantic_memory_store_envelope
summary: A versioned semantic-memory store envelope validates aliases and computes invalidity at use time without mutating stored records.
fixtures:
  config_entry_id: fake-config-entry
  valid_alias:
    alias_id: dishwasher_running
    natural_names:
      - dishwasher running
    meaning:
      type: threshold_interval
      entity_id: sensor.dishwasher_power
      operator: ">"
      value: 5
      unit: W
  unavailable_entity_alias:
    alias_id: retired_dishwasher_running
    natural_names:
      - retired dishwasher running
    meaning:
      type: threshold_interval
      entity_id: sensor.retired_dishwasher_power
      operator: ">"
      value: 5
      unit: W
expect:
  store_version: 1
  valid_alias_ids:
    - dishwasher_running
  invalid_aliases:
    - alias_id: retired_dishwasher_running
      entity_id: sensor.retired_dishwasher_power
      reason: entity_unavailable
  store_is_not_mutated: true
  invalidity_is_not_persisted: true
  unsupported_version:
    store_version: 99
    valid_alias_ids: []
    invalid_aliases: []
    store_error_code: semantic_memory_store_invalid
  duplicate_alias_id:
    alias_id: dishwasher_running
    valid_alias_ids: []
    invalid_aliases: []
    store_error_code: semantic_memory_store_invalid
