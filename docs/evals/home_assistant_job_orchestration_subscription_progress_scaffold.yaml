id: home_assistant_job_orchestration_subscription_progress_scaffold
summary: The Home Assistant integration owns a config-entry-scoped subscription/progress scaffold that records one dashboard subscription and one latest-snapshot progress event for an existing job without model, worker, rendering, mutation, memory, token, artifact, durable storage, retry, automatic progress task, worker streaming, or production orchestration calls.
executable_eval: evals/home_assistant_job_orchestration_subscription_progress_scaffold.py
fixtures:
  integration_job_orchestration_module: custom_components/isolinear/job_orchestration.py
  integration_job_state_module: custom_components/isolinear/job_state.py
  integration_websocket_module: custom_components/isolinear/websocket_api.py
  integration_setup: custom_components/isolinear/__init__.py
  fake_hass: in-code fake Home Assistant config entries, job state, WebSocket registry, and subscribe commands
expect:
  subscribe_command_routed_to_orchestration: true
  existing_job_subscription_accepted: true
  deterministic_subscription_id: true
  deterministic_progress_event_id: true
  latest_snapshot_returned_immediately: true
  unknown_job_rejected_before_subscription_storage: true
  cross_config_entry_job_rejected_before_subscription_storage: true
  per_config_entry_isolation: true
  returned_snapshots_schema_valid: true
  progress_event_snapshots_schema_valid: true
  subscription_bookkeeping_written: true
  subscription_progress_streaming_called: true
  job_orchestration_scaffold_written: true
  websocket_command_registered: true
  worker_called: false
  model_provider_called: false
  approved_home_assistant_history_read: false
  semantic_memory_called: false
  home_assistant_service_or_state_mutation_called: false
  token_generated: false
  chart_artifact_written: false
  chart_rendering_called: false
  durable_storage_written: false
  retry_behavior_called: false
  automatic_progress_task_called: false
  worker_streaming_called: false
  job_orchestration_called: false
