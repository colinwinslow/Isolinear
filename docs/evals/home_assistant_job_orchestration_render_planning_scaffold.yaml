id: home_assistant_job_orchestration_render_planning_scaffold
summary: The Home Assistant integration owns a config-entry-scoped render planning scaffold that records one placeholder safe-mode ChartSpec render plan for a scaffold-ready job without Ollama/model-provider, worker, rendering, mutation, memory, token, real artifact file, durable storage, retry/backoff, automatic progress task, worker streaming, or production orchestration calls.
executable_eval: evals/home_assistant_job_orchestration_render_planning_scaffold.py
fixtures:
  integration_job_orchestration_module: custom_components/isolinear/job_orchestration.py
  integration_job_state_module: custom_components/isolinear/job_state.py
  integration_websocket_module: custom_components/isolinear/websocket_api.py
  integration_setup: custom_components/isolinear/__init__.py
  render_plan_schema: docs/schemas/integration-render-plan.schema.json
  chart_spec_schema: docs/schemas/chart-spec.schema.json
  fake_hass: in-code fake Home Assistant config entries, job state, WebSocket registry, start commands, and snapshot commands
expect:
  snapshot_command_routed_to_orchestration: true
  scaffold_ready_job_render_plan_accepted: true
  deterministic_render_plan_id: true
  placeholder_chart_spec_planned: true
  render_plan_references_artifact_metadata: true
  artifact_backed_complete_snapshot_returned: true
  repeated_snapshot_reuses_render_plan: true
  unknown_job_rejected_before_render_planning: true
  cross_config_entry_job_rejected_before_render_planning: true
  per_config_entry_isolation: true
  render_plan_schema_valid: true
  chart_spec_schema_valid: true
  render_plan_bookkeeping_written: true
  artifact_metadata_bookkeeping_written: true
  job_state_scaffold_written: true
  job_orchestration_scaffold_written: true
  websocket_command_registered: true
  ollama_or_model_provider_called: false
  worker_called: false
  approved_home_assistant_history_read_during_render_planning: false
  semantic_memory_called: false
  home_assistant_service_or_state_mutation_called: false
  token_generated: false
  chart_artifact_written: false
  chart_rendering_called: false
  durable_storage_written: false
  retry_or_backoff_policy_called: false
  automatic_progress_task_called: false
  worker_streaming_called: false
  job_orchestration_called: false
