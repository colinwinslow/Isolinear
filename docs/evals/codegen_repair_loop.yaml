id: codegen_repair_loop
summary: Broken generated matplotlib code should trigger a capped repair loop and never bypass safety checks.
executable_eval: evals/codegen_sandbox.py
fixtures:
  chart_spec: in-code fixture from Isolinear.codegen_sandbox_anchor.sample_codegen_render_request
  generated_code: in-code fixtures from Isolinear.codegen_sandbox_anchor
expect:
  initial_runtime_error: true
  repair_loop_runs: true
  max_attempts: 2
  static_safety_checks_rerun_after_repair: true
  final_result_must_include_render_metadata: true
