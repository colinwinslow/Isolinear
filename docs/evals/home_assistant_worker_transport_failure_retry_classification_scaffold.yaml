  http_transport_failure_records_classification: true
  malformed_response_transport_failure_records_classification: true
  worker_transport_failure_classification_schema_valid: true
  worker_transport_request_schema_valid: true
  render_request_schema_valid: true
  worker_transport_failure_family_mapping_deterministic: true
  worker_authorization_redacted_in_classification_and_evidence: true
  worker_failure_code_and_message_sanitized: true
  transport_failure_does_not_store_dispatch_render_plan_artifact_progress_retry_policy_or_complete_snapshot: true
  unknown_job_rejected_before_worker_call: true
  cross_config_entry_job_rejected_before_worker_call: true
  per_config_entry_isolation: true
  worker_transport_failure_classification_bookkeeping_written: true
  worker_called_only_for_eligible_configured_jobs: true
  approved_home_assistant_history_read_during_worker_transport_classification: false
  semantic_memory_called: false
  home_assistant_service_or_state_mutation_called: false
  token_generated: false
