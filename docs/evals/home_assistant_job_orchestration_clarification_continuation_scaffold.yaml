id: home_assistant_job_orchestration_clarification_continuation_scaffold
summary: The Home Assistant integration owns a config-entry-scoped clarification-answer continuation scaffold that resumes an ambiguous job through approved history retrieval without model, worker, rendering, mutation, memory, token, artifact, durable storage, retry, streaming, or production orchestration calls.
executable_eval: evals/home_assistant_job_orchestration_clarification_continuation_scaffold.py
fixtures:
  integration_job_orchestration_module: custom_components/isolinear/job_orchestration.py
  integration_job_state_module: custom_components/isolinear/job_state.py
  integration_history_retrieval_module: custom_components/isolinear/history_retrieval.py
  integration_entity_catalog_module: custom_components/isolinear/entity_catalog.py
  integration_websocket_module: custom_components/isolinear/websocket_api.py
  integration_setup: custom_components/isolinear/__init__.py
  fake_hass: in-code fake Home Assistant catalog, history data, WebSocket registry, config entries, and pending clarification jobs
expect:
  answer_command_routed_to_orchestration: true
  accepted_option_resumes_same_job: true
  deterministic_continuation_snapshot_ids: true
  selected_option_uses_approved_catalog_entity: true
  selected_option_uses_approved_history_retrieval: true
  unknown_option_rejected_before_history_read: true
  wrong_question_rejected_before_history_read: true
  colliding_option_rejected_before_history_read: true
  unknown_job_rejected_before_history_read: true
  cross_config_entry_job_rejected_before_history_read: true
  per_config_entry_isolation: true
  returned_snapshots_schema_valid: true
  approved_entity_catalog_read: true
  home_assistant_history_read: true
  history_retrieval_scaffold_written: true
  job_state_scaffold_written: true
  job_orchestration_scaffold_written: true
  websocket_command_registered: true
  worker_called: false
  model_provider_called: false
  semantic_memory_called: false
  home_assistant_service_or_state_mutation_called: false
  token_generated: false
  chart_artifact_written: false
  chart_rendering_called: false
  durable_storage_written: false
  retry_behavior_called: false
  subscription_progress_streaming_called: false
  job_orchestration_called: false
