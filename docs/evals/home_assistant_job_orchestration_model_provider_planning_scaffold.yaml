id: home_assistant_job_orchestration_model_provider_planning_scaffold
summary: The Home Assistant integration owns a config-entry-scoped Ollama-compatible model-provider planning boundary that records provider-produced ChartSpec render plans for scaffold-ready jobs while preserving schema validation, entity allowlist gates, idempotence, per-config-entry isolation, and non-rendering read-only side-effect bounds.
executable_eval: evals/home_assistant_job_orchestration_model_provider_planning_scaffold.py
fixtures:
  integration_job_orchestration_module: custom_components/isolinear/job_orchestration.py
  integration_model_provider_module: custom_components/isolinear/model_provider.py
  integration_job_state_module: custom_components/isolinear/job_state.py
  integration_websocket_module: custom_components/isolinear/websocket_api.py
  integration_setup: custom_components/isolinear/__init__.py
  model_provider_plan_schema: docs/schemas/integration-model-provider-plan.schema.json
  planner_result_schema: docs/schemas/planner-result.schema.json
  render_plan_schema: docs/schemas/integration-render-plan.schema.json
  chart_spec_schema: docs/schemas/chart-spec.schema.json
  fake_hass: in-code fake Home Assistant config entries, job state, WebSocket registry, start commands, snapshot commands, and fake Ollama-compatible planner clients
