id: threshold_interval_use_and_remember
summary: Accepting a proposed dishwasher power threshold with remember creates a SemanticAlias and still renders the chart.
fixtures:
  prompt: Mark when the dishwasher was running over the last day
  clarification_answer:
    type: threshold_interval
    entity_id: sensor.dishwasher_power
    operator: ">"
    value: 5
    unit: W
expect:
  planner_status: chart_spec_ready
  chart_id: temperature_with_threshold_dishwasher_overlay
  saved_semantic_alias_count: 1
  alias_id: dishwasher_running
  natural_name: dishwasher running
  meaning:
    type: threshold_interval
    entity_id: sensor.dishwasher_power
    operator: ">"
    value: 5
    unit: W
  validation_status: pass
