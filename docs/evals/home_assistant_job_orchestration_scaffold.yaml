id: home_assistant_job_orchestration_scaffold
summary: The Home Assistant integration owns a config-entry-scoped job orchestration scaffold behind job/start that composes approved catalog, approved history retrieval, and job state without model, worker, rendering, mutation, memory, token, artifact, durable storage, or real orchestration calls.
executable_eval: evals/home_assistant_job_orchestration_scaffold.py
fixtures:
  integration_job_orchestration_module: custom_components/isolinear/job_orchestration.py
  integration_job_state_module: custom_components/isolinear/job_state.py
  integration_history_retrieval_module: custom_components/isolinear/history_retrieval.py
  integration_entity_catalog_module: custom_components/isolinear/entity_catalog.py
  integration_websocket_module: custom_components/isolinear/websocket_api.py
  integration_setup: custom_components/isolinear/__init__.py
  fake_hass: in-code fake Home Assistant catalog, history data, WebSocket registry, and config entries
expect:
  deterministic_job_ids: true
  deterministic_snapshot_transitions: true
  config_entry_scoped_orchestration_store: true
  start_job_uses_approved_catalog: true
  start_job_uses_approved_history_retrieval: true
  returned_snapshots_schema_valid: true
  non_catalog_prompt_entity_rejected_before_history_read: true
  missing_approved_history_returns_failed_snapshot: true
  ambiguous_prompt_returns_clarification_without_history_read: true
  per_config_entry_isolation: true
  approved_entity_catalog_read: true
  home_assistant_history_read: true
  history_retrieval_scaffold_written: true
  job_state_scaffold_written: true
  job_orchestration_scaffold_written: true
  websocket_command_registered: true
  worker_called: false
  model_provider_called: false
  semantic_memory_called: false
  home_assistant_service_or_state_mutation_called: false
  token_generated: false
  chart_artifact_written: false
  chart_rendering_called: false
  durable_storage_written: false
  job_orchestration_called: false
