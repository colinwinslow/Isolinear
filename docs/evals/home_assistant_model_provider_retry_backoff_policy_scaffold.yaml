id: home_assistant_model_provider_retry_backoff_policy_scaffold
summary: The Home Assistant integration records schema-valid, redacted, config-entry-scoped model-provider retry/backoff policy metadata for retry-safe planner failures while returning only a failed IntegrationJobSnapshot to the dashboard card and preserving read-only non-durable bounds.
executable_eval: evals/home_assistant_model_provider_retry_backoff_policy_scaffold.py
fixtures:
  integration_job_orchestration_module: custom_components/isolinear/job_orchestration.py
  integration_model_provider_module: custom_components/isolinear/model_provider.py
  model_provider_retry_policy_schema: docs/schemas/integration-model-provider-retry-policy.schema.json
  fake_hass: in-code fake Home Assistant config entries, job state, WebSocket registry, start commands, snapshot commands, and fake failing Ollama-compatible planner clients
expect:
  retry_safe_provider_failure_records_policy: true
  failed_snapshot_retry_allowed: true
  provider_retry_policy_schema_valid: true
  provider_failure_text_sanitized: true
  provider_policy_not_exposed_to_card_snapshot: true
  secret_provider_failure_rejected_before_policy: true
  malformed_provider_failure_rejected_before_policy: true
  unknown_job_rejected_before_provider_call: true
  cross_config_entry_job_rejected_before_provider_call: true
  per_config_entry_isolation: true
  model_provider_called_only_for_eligible_configured_jobs: true
  model_provider_retry_policy_bookkeeping_written: true
  model_provider_plan_bookkeeping_written: false
  render_plan_bookkeeping_written: false
  artifact_metadata_bookkeeping_written: false
  worker_called: false
  approved_home_assistant_history_read_during_provider_failure: false
  semantic_memory_called: false
  home_assistant_service_or_state_mutation_called: false
  token_generated: false
  chart_artifact_written: false
  chart_rendering_called: false
  durable_storage_written: false
  retry_behavior_called: false
  automatic_progress_task_called: false
  provider_health_polling_called: false
