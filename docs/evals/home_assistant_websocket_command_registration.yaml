id: home_assistant_websocket_command_registration
summary: The Home Assistant integration registers the Isolinear card-facing WebSocket command set idempotently while preserving scaffold validation and non-orchestration boundaries.
executable_eval: evals/home_assistant_websocket_command_registration.py
fixtures:
  integration_websocket_module: custom_components/isolinear/websocket_api.py
  integration_setup: custom_components/isolinear/__init__.py
  integration_commands: transport/auth sample IntegrationWsCommand messages
  invalid_commands: in-code wrong-version, leaky, mutating, and missing-config-entry examples
  fake_hass: in-code fake Home Assistant WebSocket command registry
expect:
  websocket_namespace: isolinear/v1/
  websocket_command_version: 1
  command_count: 5
  registered_via_async_register_command: true
  handlers_have_command_schema: true
  config_entry_scoped_result: true
  accepted_results_include_schema_valid_snapshot: true
  wrong_version_rejected_before_orchestration: true
  leaky_commands_rejected_before_orchestration: true
  mutation_commands_rejected_before_orchestration: true
  missing_config_entry_rejected_before_orchestration: true
  home_assistant_routing_accepts_card_transport_envelope: true
  home_assistant_transport_id_stripped_before_internal_schema: true
  unexpected_card_payload_keys_rejected_by_isolinear_validator: true
  auto_config_entry_resolves_single_runtime_entry: true
  auto_config_entry_resolves_single_registry_entry: true
  auto_config_entry_rejects_multiple_runtime_entries: true
  auto_config_entry_rejects_multiple_registry_entries: true
  configured_orchestration_empty_catalog_routes_to_orchestration_failure: true
  configured_orchestration_empty_catalog_does_not_return_orchestration_not_implemented: true
  configured_orchestration_followup_unknown_jobs_fail_at_orchestration_boundary: true
  websocket_decision_observability:
    fields:
      - message_id
      - command_type
      - requested_config_entry_id
      - resolved_config_entry_id
      - accepted
      - code
      - job_id
      - result_code
      - snapshot_status
      - progress_stage
    excludes:
      - prompt
      - token
      - endpoint
      - raw_history
      - generated_code
      - generated_image
  unexpected_websocket_exception_observability:
    code: isolinear_websocket_command_exception
    fields:
      - message_id
      - command_type
      - requested_config_entry_id
      - job_id
      - exception_type
    excludes:
      - prompt
      - token
      - endpoint
      - raw_history
      - generated_code
      - generated_image
  untrusted_identifier_observability_redaction:
    redacts:
      - message_id
      - config_entry_id
      - job_id
    excludes:
      - token
      - endpoint
      - local_path
  repeated_setup_duplicate_count: 0
  non_orchestrating_side_effect_scope: registered commands before orchestration setup exists
  worker_called: false
  model_provider_called: false
  home_assistant_history_called: false
  semantic_memory_called: false
  home_assistant_service_or_state_mutation_called: false
  token_generated: false
  job_orchestration_called: false
  dashboard_resource_metadata_written_or_reused: false
  websocket_command_registered: true
  websocket_decision_observability_recorded: true
