id: home_assistant_worker_token_provisioning_readiness_scaffold
summary: The Home Assistant integration owns a config-entry-scoped worker token provisioning/readiness boundary that reports redacted readiness, gates worker renderer setup on a valid integration-owned token, preserves no-token disabled behavior, and avoids leaking worker credentials to the dashboard card or model provider.
executable_eval: evals/home_assistant_worker_token_provisioning_readiness_scaffold.py
fixtures:
  integration_worker_readiness_module: custom_components/isolinear/worker_readiness.py
  integration_worker_renderer_module: custom_components/isolinear/worker_renderer.py
  integration_setup: custom_components/isolinear/__init__.py
  worker_readiness_schema: docs/schemas/integration-worker-readiness.schema.json
  fake_hass: in-code fake Home Assistant config entries, WebSocket registry, worker endpoints, and deterministic token factories
expect:
  explicit_token_provisioning_records_ready_state: true
  no_token_setup_reports_not_ready: true
  missing_worker_endpoint_reports_disabled: true
  repeated_provisioning_reuses_token: true
  unknown_config_entry_rejected_before_token_generation: true
  readiness_validation_failure_rolls_back_token: true
  readiness_schema_valid: true
  per_config_entry_isolation: true
  worker_renderer_enabled_only_when_token_ready: true
  worker_authorization_redacted_in_metadata_and_evidence: true
  token_absent_from_dashboard_card_metadata: true
  token_absent_from_model_provider_metadata: true
  token_generation_only_during_explicit_provisioning: true
  readiness_bookkeeping_written: true
  worker_renderer_setup_gated: true
  home_assistant_history_read: false
  semantic_memory_called: false
  home_assistant_service_or_state_mutation_called: false
  worker_called: false
  chart_rendering_called: false
  chart_artifact_written: false
  durable_token_storage_written: false
  token_rotation_called: false
  worker_health_check_called: false
  retry_or_backoff_policy_called: false
  automatic_progress_task_called: false
  worker_streaming_called: false
